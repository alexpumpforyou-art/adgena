services:
  caddy:
    image: caddy:2-alpine
    container_name: adgena-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Railway upstream — set in .env
      RAILWAY_UPSTREAM: ${RAILWAY_UPSTREAM}
      RAILWAY_HOST: ${RAILWAY_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
